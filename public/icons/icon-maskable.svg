<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <!--
    Maskable icon: all important content within safe zone.
    Safe zone = circle r=204.8px centered at (256,256).
    Outer 10% per side may be clipped by Android adaptive icon masks.
    Background fills entire canvas → always looks clean when clipped.
  -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#90CAF9"/>
      <stop offset="100%" stop-color="#64B5F6"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#42A5F5"/>
      <stop offset="100%" stop-color="#1976D2"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E88E5"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="3" dy="4" stdDeviation="6" flood-color="#0D47A1" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Full-bleed background (fills to edges for any clip shape) -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Receipt body — all corners within safe zone (r≤204px from center 256,256) -->
  <rect x="146" y="116" width="220" height="232" rx="12" fill="white" filter="url(#shadow)"/>

  <!-- Zigzag receipt bottom — tips at y≈386, still within safe zone -->
  <path d="M146 320 L146 354
    L162 340 L178 354 L194 340 L210 354
    L226 340 L242 354 L258 340 L274 354
    L290 340 L306 354 L322 340 L338 354
    L354 340 L366 354 L366 320 Z" fill="white"/>

  <!-- Header line -->
  <rect x="168" y="136" width="176" height="14" rx="7" fill="#BBDEFB"/>

  <!-- Item lines -->
  <rect x="168" y="162" width="140" height="9"  rx="4" fill="#E3F2FD"/>
  <rect x="168" y="178" width="120" height="9"  rx="4" fill="#E3F2FD"/>
  <rect x="168" y="194" width="130" height="9"  rx="4" fill="#E3F2FD"/>

  <!-- Divider -->
  <rect x="168" y="214" width="176" height="2" rx="1" fill="#BBDEFB"/>

  <!-- Bar chart — 4 bars, baseline at y=312 -->
  <rect x="172" y="262" width="36" height="50" rx="6" fill="url(#bar1)"/>
  <rect x="218" y="240" width="36" height="72" rx="6" fill="url(#bar2)"/>
  <rect x="264" y="250" width="36" height="62" rx="6" fill="url(#bar2)"/>
  <rect x="310" y="224" width="36" height="88" rx="6" fill="url(#bar3)"/>

  <!-- Chart baseline -->
  <rect x="168" y="312" width="180" height="3" rx="1" fill="#BBDEFB"/>

  <!--
    AI Sparkle badge — within safe zone:
    cx=348 cy=142 r=40 → distance from center = sqrt(92²+114²) ≈ 147px
    edge at 147+40 = 187px < 204.8px safe radius ✓
  -->
  <circle cx="348" cy="142" r="40" fill="#FFB300"/>
  <polygon
    points="348,106 358,136 390,136 365,154 374,184 348,166 322,184 331,154 306,136 338,136"
    fill="white"/>
</svg>
